AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Standalone stack that loads Grafana dashboard JSON files from an S3 bucket
  into an existing Amazon Managed Grafana workspace via a Lambda-backed
  custom resource. GitHub Actions uploads dashboards to S3 first, then
  deploys this stack. No file size limits — supports any number of dashboards.

Parameters:

  GrafanaWorkspaceId:
    Type: String
    Description: >
      ID of the existing Amazon Managed Grafana workspace (e.g. g-abc1234567).

  GrafanaWorkspaceEndpoint:
    Type: String
    Description: >
      Full HTTPS endpoint of the Grafana workspace
      (e.g. https://abc1234567.grafana-workspace.us-east-1.amazonaws.com).

  GrafanaServiceAccountTokenSSMPath:
    Type: String
    Description: >
      SSM Parameter Store path holding the Grafana Service Account Token
      (e.g. /grafana/my-workspace/admin-api-key).

  GrafanaFolderId:
    Type: Number
    Default: 0
    Description: >
      Grafana folder ID to import dashboards into. 0 = General (root) folder.

  DashboardsBucketName:
    Type: String
    Description: >
      Name of the S3 bucket where GitHub Actions uploads dashboard JSON files.
      Created by this stack — must be globally unique.

  DashboardsPrefix:
    Type: String
    Default: "dashboards/"
    Description: >
      S3 key prefix (folder) where dashboard JSON files are stored.
      Must end with a trailing slash.

  DashboardsVersion:
    Type: String
    Default: "1"
    Description: >
      Bumped by GitHub Actions after every S3 sync to force CloudFormation
      to re-invoke the Lambda and reload dashboards into Grafana.

Resources:

  DashboardLoaderRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "grafana-dashboard-loader-${GrafanaWorkspaceId}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DashboardLoaderPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:

              # Read the Grafana Service Account Token from SSM
              - Sid: SSMGetServiceAccountToken
                Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GrafanaServiceAccountTokenSSMPath}"

              # Decrypt SSM SecureString via the AWS-managed KMS key
              - Sid: KMSDecryptSSM
                Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: "*"
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"

              # List and read dashboard files from S3
              - Sid: S3ListBucket
                Effect: Allow
                Action: s3:ListBucket
                Resource: *
                Condition:
                  StringLike:
                    s3:prefix: !Sub "${DashboardsPrefix}*"

              - Sid: S3GetDashboards
                Effect: Allow
                Action: s3:GetObject
                Resource: *

      Tags:
        - Key: ManagedBy
          Value: CloudFormation
        - Key: GrafanaWorkspaceId
          Value: !Ref GrafanaWorkspaceId

  DashboardLoaderFunction:
    Type: AWS::Lambda::Function
    DependsOn: DashboardsBucket
    Properties:
      FunctionName: !Sub "grafana-dashboard-loader-${GrafanaWorkspaceId}"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt DashboardLoaderRole.Arn
      Timeout: 300
      MemorySize: 256
      Environment:
        Variables:
          WORKSPACE_ENDPOINT: !Ref GrafanaWorkspaceEndpoint
          SSM_TOKEN_PATH:     !Ref GrafanaServiceAccountTokenSSMPath
          BUCKET_NAME:        !Ref DashboardsBucketName
          DASHBOARDS_PREFIX:  !Ref DashboardsPrefix
          FOLDER_ID:          !Ref GrafanaFolderId
      Code:
        ZipFile: |
          import json
          import os
          import urllib.request
          import urllib.error
          import boto3
          import cfnresponse

          s3       = boto3.client("s3")
          ssm      = boto3.client("ssm")
          ENDPOINT = os.environ["WORKSPACE_ENDPOINT"].rstrip("/")
          BUCKET   = os.environ["BUCKET_NAME"]
          PREFIX   = os.environ["DASHBOARDS_PREFIX"]
          FOLDER   = int(os.environ.get("FOLDER_ID", "0"))

          # ── helpers ─────────────────────────────────────────────

          def get_token():
              resp = ssm.get_parameter(
                  Name=os.environ["SSM_TOKEN_PATH"], WithDecryption=True)
              return resp["Parameter"]["Value"]

          def grafana(method, path, token, body=None):
              data = json.dumps(body).encode() if body else None
              req  = urllib.request.Request(
                  ENDPOINT + path, data=data, method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type":  "application/json",
                      "Accept":        "application/json",
                  })
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      raw = r.read()
                      return r.status, json.loads(raw) if raw else {}
              except urllib.error.HTTPError as e:
                  raw = e.read()
                  return e.code, json.loads(raw) if raw else {}

          def list_dashboard_keys():
              """List all .json keys under the configured S3 prefix."""
              paginator = s3.get_paginator("list_objects_v2")
              keys = []
              for page in paginator.paginate(Bucket=BUCKET, Prefix=PREFIX):
                  for obj in page.get("Contents", []):
                      if obj["Key"].endswith(".json"):
                          keys.append(obj["Key"])
              print(f"Found {len(keys)} dashboard(s) in s3://{BUCKET}/{PREFIX}")
              return keys

          def fetch_dashboard(key):
              """Download and parse one dashboard JSON from S3."""
              resp = s3.get_object(Bucket=BUCKET, Key=key)
              return json.loads(resp["Body"].read())

          def import_dashboard(key, token):
              """Download from S3 and POST to Grafana. Returns (success, uid, msg)."""
              filename = key.split("/")[-1]
              dash     = fetch_dashboard(key)
              dash.pop("id", None)   # strip id — upsert by uid

              payload = {
                  "dashboard": dash,
                  "folderId":  FOLDER,
                  "overwrite": True,
                  "message":   "Loaded from S3 via CloudFormation",
              }
              status, body = grafana("POST", "/api/dashboards/db", token, payload)
              uid     = body.get("uid", "")
              msg     = body.get("status") or body.get("message", "")
              success = status in (200, 201)

              print(f"  {'OK' if success else 'FAIL'} [{status}] {filename} uid={uid} {msg}")
              return success, uid, f"HTTP {status}: {msg}"

          def delete_dashboard(key, token):
              """Read uid from S3 JSON, DELETE from Grafana. Best-effort."""
              filename = key.split("/")[-1]
              try:
                  dash = fetch_dashboard(key)
                  uid  = dash.get("uid")
                  if not uid:
                      print(f"  SKIP {filename} — no uid field")
                      return
                  status, _ = grafana("DELETE", f"/api/dashboards/uid/{uid}", token)
                  print(f"  DELETE {filename} uid={uid} → HTTP {status}")
              except Exception as exc:
                  print(f"  WARNING: could not delete {filename}: {exc}")

          # ── CFN handler ──────────────────────────────────────────

          def handler(event, context):
              print("RequestType:", event["RequestType"])
              physical_id  = event.get("PhysicalResourceId", "grafana-dashboards")
              request_type = event["RequestType"]

              # Fetch token upfront — needed for all request types
              try:
                  token = get_token()
              except Exception as exc:
                  print(f"ERROR retrieving token: {exc}")
                  cfnresponse.send(event, context, cfnresponse.FAILED,
                      {"Message": f"Could not retrieve service account token: {exc}"},
                      physical_id)
                  return

              try:
                  keys = list_dashboard_keys()
              except Exception as exc:
                  print(f"ERROR listing S3 keys: {exc}")
                  cfnresponse.send(event, context, cfnresponse.FAILED,
                      {"Message": f"Could not list dashboards from S3: {exc}"},
                      physical_id)
                  return

              # ---- CREATE / UPDATE --------------------------------
              if request_type in ("Create", "Update"):
                  if not keys:
                      print("No dashboard files found in S3 — nothing to import")
                      cfnresponse.send(event, context, cfnresponse.SUCCESS,
                          {"Message": "No dashboards found in S3", "LoadedCount": 0},
                          physical_id)
                      return

                  errors = []
                  uids   = []
                  for key in keys:
                      try:
                          ok, uid, msg = import_dashboard(key, token)
                          if ok:
                              uids.append({"file": key.split("/")[-1], "uid": uid})
                          else:
                              errors.append({"file": key, "error": msg})
                      except Exception as exc:
                          errors.append({"file": key, "error": str(exc)})

                  if errors:
                      cfnresponse.send(event, context, cfnresponse.FAILED,
                          {"Message": "Some dashboards failed to load", "Errors": errors},
                          physical_id)
                  else:
                      cfnresponse.send(event, context, cfnresponse.SUCCESS,
                          {"LoadedCount": len(uids), "Dashboards": uids},
                          physical_id)

              # ---- DELETE ----------------------------------------
              elif request_type == "Delete":
                  for key in keys:
                      delete_dashboard(key, token)
                  cfnresponse.send(event, context, cfnresponse.SUCCESS,
                      {"Message": "Dashboards removed (best-effort)"}, physical_id)

      Tags:
        - Key: ManagedBy
          Value: CloudFormation
        - Key: GrafanaWorkspaceId
          Value: !Ref GrafanaWorkspaceId

  GrafanaDashboards:
    Type: Custom::GrafanaDashboards
    DependsOn: DashboardsBucket
    Properties:
      ServiceToken:      !GetAtt DashboardLoaderFunction.Arn
      WorkspaceId:       !Ref GrafanaWorkspaceId
      BucketName:        !Ref DashboardsBucketName
      DashboardsPrefix:  !Ref DashboardsPrefix
      DashboardsVersion: !Ref DashboardsVersion

Outputs:

  DashboardsBucketName:
    Description: S3 bucket where GitHub Actions uploads dashboard JSON files
    Value: !Ref DashboardsBucket
    Export:
      Name: !Sub "${AWS::StackName}-DashboardsBucketName"

  DashboardsBucketArn:
    Description: ARN of the dashboards S3 bucket
    Value: !GetAtt DashboardsBucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-DashboardsBucketArn"

  LambdaFunctionName:
    Description: Name of the dashboard loader Lambda function
    Value: !Ref DashboardLoaderFunction
    Export:
      Name: !Sub "${AWS::StackName}-LambdaFunctionName"

  LambdaFunctionArn:
    Description: ARN of the dashboard loader Lambda function
    Value: !GetAtt DashboardLoaderFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LambdaFunctionArn"

  DashboardLoaderRoleArn:
    Description: IAM role ARN used by the dashboard loader Lambda
    Value: !GetAtt DashboardLoaderRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-DashboardLoaderRoleArn"
