  # Custom Resource — triggers the API key generator Lambda.
  # GrafanaApiKey:
  #   Type: Custom::GrafanaServiceAccountToken
  #   Properties:
  #     ServiceToken: !GetAtt GrafanaServiceAccountTokenFunction.Arn
  #     WorkspaceId:  !Ref WorkspaceId
  #     # Bump TokenVersion to force token rotation on a future stack update
  #     TokenVersion: "1"


  # Lambda — Custom resource: install Grafana plugins
  GrafanaPluginInstallerFunction:
    Type: AWS::Lambda::Function
    #DependsOn: GrafanaApiKey
    Properties:
      FunctionName: !Sub "${WorkspaceName}-plugin-installer"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt CustomResourceLambdaRole.Arn
      Timeout: 300
      Environment:
        Variables:
          WORKSPACE_ENDPOINT:  !Ref WorkspaceEndpoint
          SSM_API_KEY_PATH:   !Sub "/grafana/${WorkspaceName}/admin-api-key"
      Code:
        ZipFile: |
          import json
          import urllib.request
          import urllib.error
          import os
          import boto3
          import cfnresponse

          def get_api_key():
              ssm = boto3.client("ssm")
              resp = ssm.get_parameter(Name=os.environ["SSM_API_KEY_PATH"], WithDecryption=True)
              return resp["Parameter"]["Value"]

          def grafana_request(method, path, api_key, body=None):
              url  = os.environ["WORKSPACE_ENDPOINT"].rstrip("/") + path
              data = json.dumps(body).encode() if body else None
              req  = urllib.request.Request(url, data=data, method=method, headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type":  "application/json",
              })
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return r.status, json.loads(r.read())
              except urllib.error.HTTPError as e:
                  return e.code, json.loads(e.read())

          def handler(event, context):
              print("Event:", json.dumps(event))
              request_type = event["RequestType"]
              props        = event.get("ResourceProperties", {})
              plugins      = props.get("PluginIds", "")
              if isinstance(plugins, str):
                  plugins = [p.strip() for p in plugins.split(",") if p.strip()]

              try:
                  api_key = get_api_key()
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED,
                      {"Message": f"Could not retrieve API key: {e}"})
                  return

              errors = []
              if request_type in ("Create", "Update"):
                  for plugin_id in plugins:
                      status, body = grafana_request("POST", f"/api/plugins/{plugin_id}/install", api_key)
                      print(f"Install {plugin_id}: {status} {body}")
                      if status not in (200, 201, 409):   # 409 = already installed
                          errors.append({"plugin": plugin_id, "status": status})
              elif request_type == "Delete":
                  for plugin_id in plugins:
                      status, body = grafana_request("POST", f"/api/plugins/{plugin_id}/uninstall", api_key)
                      print(f"Uninstall {plugin_id}: {status} {body}")

              if errors:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {"Errors": errors})
              else:
                  cfnresponse.send(event, context, cfnresponse.SUCCESS,
                      {"Message": f"Plugins processed: {plugins}"})

      Tags:
        - Key: ManagedBy
          Value: CloudFormation

  GrafanaPlugins:
    Type: Custom::GrafanaPlugins
    #DependsOn: GrafanaApiKey
    Properties:
      ServiceToken: !GetAtt GrafanaPluginInstallerFunction.Arn
      WorkspaceId:  !Ref WorkspaceId
      PluginIds:    !Join [",", !Ref PluginIds]


