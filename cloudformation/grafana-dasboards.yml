AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Standalone stack that loads Grafana dashboard JSON files directly from
  GitHub Actions into an existing Amazon Managed Grafana workspace.
  Dashboard files are base64-encoded by the workflow and passed as a
  CloudFormation parameter — no S3 bucket required.

# ================================================================
# PARAMETERS
# ================================================================
Parameters:

  GrafanaWorkspaceId:
    Type: String
    Description: >
      ID of the existing Amazon Managed Grafana workspace (e.g. g-abc1234567).

  GrafanaWorkspaceEndpoint:
    Type: String
    Description: >
      Full HTTPS endpoint of the Grafana workspace
      (e.g. https://abc1234567.grafana-workspace.us-east-1.amazonaws.com).

  GrafanaServiceAccountTokenSSMPath:
    Type: String
    Description: >
      SSM Parameter Store path holding the Grafana Service Account Token.
      (e.g. /grafana/my-workspace/admin-api-key).

  GrafanaFolderId:
    Type: Number
    Default: 0
    Description: >
      Grafana folder ID to import dashboards into. 0 = General (root) folder.

  # -------------------------------------------------------------------
  # DashboardsPayload — set by GitHub Actions, not by humans.
  #
  # The workflow reads every .json file from the repo dashboards/ folder,
  # builds this structure, JSON-encodes it, then base64-encodes the whole
  # thing so it survives CFN parameter quoting safely:
  #
  #   [
  #     { "filename": "cpu-overview.json",   "content": "<base64 of JSON>" },
  #     { "filename": "memory-usage.json",   "content": "<base64 of JSON>" },
  #     ...
  #   ]
  #
  # The Lambda decodes each entry and POSTs it to Grafana.
  # Changing this parameter on a stack update triggers a re-import.
  # -------------------------------------------------------------------
  DashboardsPayload:
    Type: String
    Default: "W10="   # base64("[]") — empty list, safe initial value
    Description: >
      Base64-encoded JSON array of dashboard files set by GitHub Actions.
      Each element: { "filename": "...", "content": "<base64 dashboard JSON>" }.
      Do not set this manually — it is managed by the deploy workflow.

  DashboardsVersion:
    Type: String
    Default: "1"
    Description: >
      Increment to force CloudFormation to re-invoke the dashboard loader
      even if DashboardsPayload hash has not changed.

Resources:

  # IAM Role — Lambda execution role
  DashboardLoaderRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "grafana-dashboard-loader-${GrafanaWorkspaceId}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DashboardLoaderPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:

              # Read the Grafana Service Account Token from SSM
              - Sid: SSMGetServiceAccountToken
                Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GrafanaServiceAccountTokenSSMPath}"

              # Decrypt SSM SecureString via the AWS-managed KMS key
              - Sid: KMSDecryptSSM
                Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: "*"
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"

      Tags:
        - Key: ManagedBy
          Value: CloudFormation
        - Key: GrafanaWorkspaceId
          Value: !Ref GrafanaWorkspaceId

  # Lambda — Dashboard loader
  DashboardLoaderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "grafana-dashboard-loader-${GrafanaWorkspaceId}"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt DashboardLoaderRole.Arn
      Timeout: 300
      MemorySize: 256
      Environment:
        Variables:
          WORKSPACE_ENDPOINT: !Ref GrafanaWorkspaceEndpoint
          SSM_TOKEN_PATH:     !Ref GrafanaServiceAccountTokenSSMPath
          FOLDER_ID:          !Ref GrafanaFolderId
      Code:
        ZipFile: |
          import base64
          import json
          import os
          import urllib.request
          import urllib.error
          import boto3
          import cfnresponse

          ssm      = boto3.client("ssm")
          ENDPOINT = os.environ["WORKSPACE_ENDPOINT"].rstrip("/")
          FOLDER   = int(os.environ.get("FOLDER_ID", "0"))

          # ── helpers ─────────────────────────────────────────────

          def get_token():
              resp = ssm.get_parameter(
                  Name=os.environ["SSM_TOKEN_PATH"], WithDecryption=True)
              return resp["Parameter"]["Value"]

          def grafana(method, path, token, body=None):
              data = json.dumps(body).encode() if body else None
              req  = urllib.request.Request(
                  ENDPOINT + path, data=data, method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type":  "application/json",
                      "Accept":        "application/json",
                  })
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      raw = r.read()
                      return r.status, json.loads(raw) if raw else {}
              except urllib.error.HTTPError as e:
                  raw = e.read()
                  return e.code, json.loads(raw) if raw else {}

          def decode_payload(raw_payload):
              """
              Decode the DashboardsPayload parameter.
              Returns a list of (filename, dashboard_dict) tuples.

              Payload structure (base64 of JSON):
                [
                  { "filename": "cpu.json", "content": "<base64 of dashboard JSON>" },
                  ...
                ]
              """
              try:
                  outer = base64.b64decode(raw_payload).decode("utf-8")
                  entries = json.loads(outer)
              except Exception as e:
                  raise ValueError(f"Could not decode DashboardsPayload: {e}")

              dashboards = []
              for entry in entries:
                  filename = entry.get("filename", "unknown")
                  try:
                      content = base64.b64decode(entry["content"]).decode("utf-8")
                      dash    = json.loads(content)
                      dashboards.append((filename, dash))
                  except Exception as e:
                      raise ValueError(f"Could not decode dashboard '{filename}': {e}")

              print(f"Decoded {len(dashboards)} dashboard(s) from payload")
              return dashboards

          def import_dashboard(filename, dash, token):
              """POST one dashboard dict to Grafana. Returns (success, uid, msg)."""
              # Remove id field — lets Grafana upsert by uid instead of id
              dash.pop("id", None)

              payload = {
                  "dashboard": dash,
                  "folderId":  FOLDER,
                  "overwrite": True,
                  "message":   "Loaded from GitHub via CloudFormation",
              }
              status, body = grafana("POST", "/api/dashboards/db", token, payload)
              uid     = body.get("uid", "")
              msg     = body.get("status") or body.get("message", "")
              success = status in (200, 201)

              print(f"  {'OK' if success else 'FAIL'} [{status}] {filename} uid={uid} {msg}")
              return success, uid, f"HTTP {status}: {msg}"

          def delete_dashboard(filename, dash, token):
              """DELETE a dashboard by uid. Best-effort — never fails the stack."""
              try:
                  uid = dash.get("uid")
                  if not uid:
                      print(f"  SKIP {filename} — no uid field")
                      return
                  status, body = grafana("DELETE", f"/api/dashboards/uid/{uid}", token)
                  print(f"  DELETE {filename} uid={uid} → HTTP {status}")
              except Exception as exc:
                  print(f"  WARNING: could not delete {filename}: {exc}")

          # ── CFN handler ──────────────────────────────────────────

          def handler(event, context):
              print("RequestType:", event["RequestType"])
              props       = event.get("ResourceProperties", {})
              raw_payload = props.get("DashboardsPayload", "W10=")  # default: []
              physical_id = event.get("PhysicalResourceId", "grafana-dashboards")
              request_type = event["RequestType"]

              # Decode payload first — fail fast if it's malformed
              try:
                  dashboards = decode_payload(raw_payload)
              except Exception as exc:
                  print(f"ERROR decoding payload: {exc}")
                  cfnresponse.send(event, context, cfnresponse.FAILED,
                      {"Message": str(exc)}, physical_id)
                  return

              if not dashboards:
                  print("Empty dashboard payload — nothing to do")
                  cfnresponse.send(event, context, cfnresponse.SUCCESS,
                      {"Message": "No dashboards in payload", "LoadedCount": 0},
                      physical_id)
                  return

              # Fetch token — needed for all operations
              try:
                  token = get_token()
              except Exception as exc:
                  print(f"ERROR retrieving token: {exc}")
                  cfnresponse.send(event, context, cfnresponse.FAILED,
                      {"Message": f"Could not retrieve service account token: {exc}"},
                      physical_id)
                  return

              # ---- CREATE / UPDATE --------------------------------
              if request_type in ("Create", "Update"):
                  errors = []
                  uids   = []

                  for filename, dash in dashboards:
                      try:
                          ok, uid, msg = import_dashboard(filename, dash, token)
                          if ok:
                              uids.append({"file": filename, "uid": uid})
                          else:
                              errors.append({"file": filename, "error": msg})
                      except Exception as exc:
                          errors.append({"file": filename, "error": str(exc)})

                  if errors:
                      cfnresponse.send(event, context, cfnresponse.FAILED,
                          {"Message": "Some dashboards failed", "Errors": errors},
                          physical_id)
                  else:
                      cfnresponse.send(event, context, cfnresponse.SUCCESS,
                          {"LoadedCount": len(uids), "Dashboards": uids},
                          physical_id)

              # ---- DELETE ----------------------------------------
              elif request_type == "Delete":
                  for filename, dash in dashboards:
                      delete_dashboard(filename, dash, token)
                  cfnresponse.send(event, context, cfnresponse.SUCCESS,
                      {"Message": "Dashboards removed (best-effort)"}, physical_id)

      Tags:
        - Key: ManagedBy
          Value: CloudFormation
        - Key: GrafanaWorkspaceId
          Value: !Ref GrafanaWorkspaceId

  # Custom resource — triggers the Lambda on every stack event.
  GrafanaDashboards:
    Type: Custom::GrafanaDashboards
    Properties:
      ServiceToken:       !GetAtt DashboardLoaderFunction.Arn
      WorkspaceId:        !Ref GrafanaWorkspaceId
      DashboardsPayload:  !Ref DashboardsPayload
      DashboardsVersion:  !Ref DashboardsVersion

Outputs:

  LambdaFunctionName:
    Description: Name of the dashboard loader Lambda function
    Value: !Ref DashboardLoaderFunction
    Export:
      Name: !Sub "${AWS::StackName}-LambdaFunctionName"

  LambdaFunctionArn:
    Description: ARN of the dashboard loader Lambda function
    Value: !GetAtt DashboardLoaderFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LambdaFunctionArn"

  DashboardLoaderRoleArn:
    Description: IAM role ARN used by the dashboard loader Lambda
    Value: !GetAtt DashboardLoaderRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-DashboardLoaderRoleArn"
