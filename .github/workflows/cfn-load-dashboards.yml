name: Deploy Grafana Dashboard Loader

on:
  push:
    branches:
      - main
    paths:
      - "cloudformation/grafana-dashboards.yml"
      - "dashboards/**"
      - ".github/workflows/cfn-load-dashboards.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - development
          - production
      action:
        description: "Action to run"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy   # Upload dashboards to S3 then deploy/update CFN stack
          - delete

concurrency:
  group: grafana-dashboards-${{ github.event.inputs.environment || 'development' }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  STACK_NAME: grafana-dashboard-loader-${{ github.event.inputs.environment || 'development' }}
  TEMPLATE_FILE: cloudformation/grafana-dashboards.yml
  DASHBOARDS_DIR: dashboards

jobs:

  validate:
    name: Validate
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'development' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body file://${{ env.TEMPLATE_FILE }}
          echo "✅ Template valid"

      - name: Check dashboards folder
        run: |
          if [ ! -d "${{ env.DASHBOARDS_DIR }}" ]; then
            echo "❌ '${{ env.DASHBOARDS_DIR }}/' not found in repo root"
            exit 1
          fi

          COUNT=$(find ${{ env.DASHBOARDS_DIR }} -name "*.json" | wc -l | tr -d ' ')
          if [ "$COUNT" -eq 0 ]; then
            echo "❌ No .json files found in ${{ env.DASHBOARDS_DIR }}/"
            exit 1
          fi

          echo "✅ Found ${COUNT} dashboard(s):"
          find ${{ env.DASHBOARDS_DIR }} -name "*.json" | sort | sed 's/^/   /'

          # Validate each file is parseable JSON
          echo "Validating JSON syntax..."
          find ${{ env.DASHBOARDS_DIR }} -name "*.json" | while read f; do
            python3 -c "import json,sys; json.load(open('$f'))" \
              && echo "  OK: $f" \
              || { echo "  ❌ Invalid JSON: $f"; exit 1; }
          done
          echo "✅ All files are valid JSON"

  # First create the S3 bucket if it doesn't exist.
  bootstrap-bucket:
    name: Bootstrap S3 Bucket
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ github.event.inputs.environment || 'development' }}
    permissions:
      contents: read
    outputs:
      bucket_name: ${{ steps.bucket.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve bucket name
        id: bucket
        run: |
          ENV="${{ github.event.inputs.environment || 'development' }}"
          BUCKET="grafana-dashboards-${ENV}-${{ secrets.AWS_ACCOUNT_ID }}"
          echo "name=${BUCKET}" >> $GITHUB_OUTPUT
          echo "🪣 Bucket: ${BUCKET}"

      # Create the bucket directly via AWS CLI if it doesn't exist yet.
      # The CFN stack will later adopt it via the DashboardsBucketName parameter.
      - name: Ensure S3 bucket exists
        run: |
          BUCKET="${{ steps.bucket.outputs.name }}"

          if aws s3api head-bucket --bucket "${BUCKET}" 2>/dev/null; then
            echo "✅ Bucket already exists: ${BUCKET}"
          else
            echo "🪣 Creating bucket: ${BUCKET}"
            if [ "${{ env.AWS_REGION }}" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "${BUCKET}"
            else
              aws s3api create-bucket --bucket "${BUCKET}" \
                --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}
            fi

            # Enable versioning and encryption
            aws s3api put-bucket-versioning \
              --bucket "${BUCKET}" \
              --versioning-configuration Status=Enabled

            aws s3api put-bucket-encryption \
              --bucket "${BUCKET}" \
              --server-side-encryption-configuration \
                '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

            aws s3api put-public-access-block \
              --bucket "${BUCKET}" \
              --public-access-block-configuration \
                "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"

            echo "✅ Bucket created and configured: ${BUCKET}"
          fi


  # Upload Dashboards — sync repo dashboards/ folder to S3.
  upload-dashboards:
    name: Upload Dashboards → S3
    runs-on: ubuntu-latest
    needs: bootstrap-bucket
    environment: ${{ github.event.inputs.environment || 'development' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve bucket name
        id: bucket
        run: |
          ENV="${{ github.event.inputs.environment || 'development' }}"
          BUCKET="grafana-dashboards-${ENV}-${{ secrets.AWS_ACCOUNT_ID }}"
          echo "name=${BUCKET}" >> $GITHUB_OUTPUT
          echo "🪣 Bucket: ${BUCKET}"

      - name: Sync dashboards to S3
        run: |
          BUCKET="${{ steps.bucket.outputs.name }}"
          echo "⬆️  Syncing ${{ env.DASHBOARDS_DIR }}/ → s3://${BUCKET}/dashboards/"

          aws s3 sync ${{ env.DASHBOARDS_DIR }}/ \
            s3://${BUCKET}/dashboards/ \
            --include "*.json" \
            --delete \
            --content-type "application/json"

          COUNT=$(aws s3 ls s3://${BUCKET}/dashboards/ | grep -c '\.json' || true)
          echo "✅ ${COUNT} dashboard(s) now in S3"

  # Deploy/update the CFN stack.
  deploy:
    name: Deploy CFN Stack
    runs-on: ubuntu-latest
    needs: [bootstrap-bucket, upload-dashboards]
    environment: ${{ github.event.inputs.environment || 'development' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve next DashboardsVersion
        id: version
        run: |
          CURRENT=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Parameters[?ParameterKey=='DashboardsVersion'].ParameterValue" \
            --output text 2>/dev/null || echo "0")
          NEW=$((CURRENT + 1))
          echo "version=${NEW}" >> $GITHUB_OUTPUT
          echo "🔢 DashboardsVersion: ${CURRENT} → ${NEW}"

      - name: Resolve bucket name
        id: bucket
        run: |
          ENV="${{ github.event.inputs.environment || 'development' }}"
          BUCKET="grafana-dashboards-${ENV}-${{ secrets.AWS_ACCOUNT_ID }}"
          echo "name=${BUCKET}" >> $GITHUB_OUTPUT
          echo "🪣 Bucket: ${BUCKET}"

      - name: Deploy CloudFormation stack
        run: |
          ENV="${{ github.event.inputs.environment || 'development' }}"
          BUCKET="${{ steps.bucket.outputs.name }}"

          echo "🚀 Deploying ${{ env.STACK_NAME }}"

          aws cloudformation deploy \
            --template-file ${{ env.TEMPLATE_FILE }} \
            --stack-name ${{ env.STACK_NAME }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --import-existing-resources \
            --parameter-overrides \
              GrafanaWorkspaceId="${{ secrets.GRAFANA_WORKSPACE_ID }}" \
              GrafanaWorkspaceEndpoint="${{ secrets.GRAFANA_WORKSPACE_ENDPOINT }}" \
              GrafanaServiceAccountTokenSSMPath="${{ secrets.GRAFANA_API_KEY_SSM_PATH }}" \
              GrafanaFolderId="0" \
              DashboardsBucketName="${BUCKET}" \
              DashboardsPrefix="dashboards/" \
              DashboardsVersion="${{ steps.version.outputs.version }}" \
            --tags \
              Environment="${ENV}" \
              ManagedBy="GitHubActions" \
              Repository="${{ github.repository }}" \
              Commit="${{ github.sha }}"

          echo "✅ Stack deployed"

      - name: Print summary
        run: |
          BUCKET="${{ needs.bootstrap-bucket.outputs.bucket_name }}"
          COUNT=$(aws s3 ls s3://${BUCKET}/dashboards/ | grep -c '\.json' || true)

          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  ✅  Dashboards loaded into Grafana                          ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  📊  ${COUNT} dashboard(s) synced and imported"
          echo "║  🪣  s3://${BUCKET}/dashboards/"
          echo "║  🌐  ${{ secrets.GRAFANA_WORKSPACE_ENDPOINT }}"
          echo "╚══════════════════════════════════════════════════════════════╝"


  # Delete — empty the bucket first, then delete the CFN stack.
  delete:
    name: Delete Stack
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'delete'
    environment: ${{ github.event.inputs.environment || 'development' }}
    permissions:
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Empty S3 bucket before stack deletion
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='DashboardsBucketName'].OutputValue" \
            --output text 2>/dev/null || echo "")

          if [ -n "$BUCKET" ]; then
            echo "🧹 Emptying bucket: ${BUCKET}"
            aws s3 rm s3://${BUCKET} --recursive
            echo "✅ Bucket emptied"
          else
            echo "ℹ️  No bucket found in stack outputs — skipping"
          fi

      - name: Delete CloudFormation stack
        run: |
          echo "🗑️  Deleting ${{ env.STACK_NAME }}"
          aws cloudformation delete-stack --stack-name ${{ env.STACK_NAME }}
          aws cloudformation wait stack-delete-complete \
            --stack-name ${{ env.STACK_NAME }}
          echo "✅ Stack deleted"
