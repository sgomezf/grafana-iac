name: Deploy Grafana Workspace

on:
  push:
    branches:
      - main
    paths:
      - "cloudformation/grafana-workspace.yml"
      - ".github/workflows/cfn-deploy-grafana.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "development"
        type: choice
        options:
          - development
          #- staging
          - production
      action:
        description: "Stack action"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - delete

# Prevent concurrent deployments to the same environment
concurrency:
  group: grafana-deploy-${{ github.event.inputs.environment || 'development' }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-2
  STACK_NAME: grafana-${{ github.event.inputs.environment || 'development' }}
  TEMPLATE_FILE: cloudformation/grafana-workspace.yml

jobs:
  # ------------------------------------------------------------------
  # Validate the CloudFormation template before any deployment attempt
  # ------------------------------------------------------------------
  validate:
    name: Validate Template
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'development' }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body file://${{ env.TEMPLATE_FILE }}
          echo "✅ Template validation passed"

  # ------------------------------------------------------------------
  # Deploy (create or update) the CloudFormation stack
  # ------------------------------------------------------------------
  deploy:
    name: Deploy Stack
    runs-on: ubuntu-latest
    needs: validate
    if: github.event.inputs.action != 'delete'
    environment: ${{ github.event.inputs.environment || 'development' }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy CloudFormation stack
        id: deploy
        run: |
          ENV="${{ github.event.inputs.environment || 'development' }}"

          echo "🚀 Deploying stack: ${{ env.STACK_NAME }}"

          aws cloudformation deploy \
            --template-file ${{ env.TEMPLATE_FILE }} \
            --stack-name ${{ env.STACK_NAME }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              WorkspaceName="grafana-${ENV}" \
              WorkspaceDescription="Grafana workspace for ${ENV} environment" \
              GrafanaVersion="10.4" \
              OrganizationRoleName="ADMIN" \
            --tags \
              Environment="${ENV}" \
              ManagedBy="GitHubActions" \
              Repository="${{ github.repository }}" \
              Commit="${{ github.sha }}"

          echo "✅ Stack deployment complete"

      - name: Fetch stack outputs
        run: |
          echo "📋 Stack Outputs:"
          aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[*].{Key:OutputKey,Value:OutputValue}" \
            --output table

      - name: Print Grafana URL
        run: |
          ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='WorkspaceEndpoint'].OutputValue" \
            --output text)
          echo "🌐 Grafana Workspace URL: ${ENDPOINT}"
          echo "GRAFANA_URL=${ENDPOINT}" >> $GITHUB_ENV

  # ------------------------------------------------------------------
  # Delete the CloudFormation stack (manual trigger only)
  # ------------------------------------------------------------------
  delete:
    name: Delete Stack
    runs-on: ubuntu-latest
    needs: validate
    if: github.event.inputs.action == 'delete'
    environment: ${{ github.event.inputs.environment || 'development' }}
    permissions:
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete CloudFormation stack
        run: |
          echo "🗑️  Deleting stack: ${{ env.STACK_NAME }}"

          aws cloudformation delete-stack \
            --stack-name ${{ env.STACK_NAME }}

          echo "⏳ Waiting for stack deletion to complete..."

          aws cloudformation wait stack-delete-complete \
            --stack-name ${{ env.STACK_NAME }}

          echo "✅ Stack deleted successfully"
