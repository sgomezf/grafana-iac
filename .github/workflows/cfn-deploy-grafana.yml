name: Deploy Grafana Workspace

on:
  push:
    branches:
      - main
    paths:
      - "cloudformation/grafana-workspace.yml"
      - ".github/workflows/cfn-deploy-grafana.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "development"
        type: choice
        options:
          - development
          #- staging
          - production
      action:
        description: "Stack action"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - delete

# Prevent concurrent deployments to the same environment
concurrency:
  group: grafana-deploy-${{ github.event.inputs.environment || 'development' }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-2
  GRAFANA_STACK_NAME: grafana-${{ github.event.inputs.environment || 'development' }}
  GRAFANA_TEMPLATE_FILE: cloudformation/grafana-workspace.yml
  CONFIG_STACK_NAME: grafana-${{ github.event.inputs.environment || 'development' }}
  CONFIG_TEMPLATE_FILE: cloudformation/grafana-config.yml

jobs:
  # ------------------------------------------------------------------
  # Validate the CloudFormation template before any deployment attempt
  # ------------------------------------------------------------------
  validate:
    name: Validate Template
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'development' }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate Grafana CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body file://${{ env.GRAFANA_TEMPLATE_FILE }}
          echo "✅ Template validation passed"


      - name: Validate Config CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body file://${{ env.CONFIG_TEMPLATE_FILE }}
          echo "✅ Template validation passed"


  # ------------------------------------------------------------------
  # Deploy (create or update) the Gragana CloudFormation stack
  # ------------------------------------------------------------------
  deploy-grafana:
    name: Deploy Grafana Workspace
    runs-on: ubuntu-latest
    needs: validate
    if: github.event.inputs.action != 'delete'
    outputs:
      grafana_url: ${{ steps.deploy-grafana.outputs.WorkspaceEndpoint }}
      workspace_id: ${{ steps.deploy-grafana.outputs.WorkspaceId }}
      workspace_name: ${{ steps.deploy-grafana.outputs.WorkspaceName }}
      workspace_endpoint: ${{ steps.deploy-grafana.outputs.WorkspaceEndpoint }}
      alert_topic_arn: ${{ steps.deploy-grafana.outputs.AlertTopicArn }}
      grafana_role_arn: ${{ steps.deploy-grafana.outputs.GrafanaRoleArn }}
      api_key_ssm_path: ${{ steps.deploy-grafana.outputs.ApiKeySSMPath }}
      grafana_plugin_installer_function_arn: ${{ steps.deploy-grafana.outputs.GrafanaPluginInstallerFunctionArn }}
      grafana_api_key_generator_function_arn: ${{ steps.deploy-grafana.outputs.GrafanaApiKeyGeneratorFunctionArn }}

    environment: ${{ github.event.inputs.environment || 'development' }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy GrafanaCloudFormation stack
        id: deploy-grafana
        run: |
          ENV="${{ github.event.inputs.environment || 'development' }}"

          echo "🚀 Deploying stack: ${{ env.GRAFANA_STACK_NAME }}"

          aws cloudformation deploy \
            --template-file ${{ env.GRAFANA_TEMPLATE_FILE }} \
            --stack-name ${{ env.GRAFANA_STACK_NAME }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              WorkspaceName="grafana-${ENV}" \
              WorkspaceDescription="Grafana workspace for ${ENV} environment" \
              GrafanaVersion="12.4" \
              OrganizationRoleName="ADMIN" \
            --tags \
              Environment="${ENV}" \
              ManagedBy="GitHubActions" \
              Repository="${{ github.repository }}" \
              Commit="${{ github.sha }}"

          echo "✅ Stack deployment complete"

      - name: Fetch stack outputs
        run: |
          echo "📋 Stack Outputs:"
          aws cloudformation describe-stacks \
            --stack-name ${{ env.GRAFANA_STACK_NAME }} \
            --query "Stacks[0].Outputs[*].{Key:OutputKey,Value:OutputValue}" \
            --output table

      - name: Print Grafana URL
        run: |
          ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.GRAFANA_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='WorkspaceEndpoint'].OutputValue" \
            --output text)
          echo "🌐 Grafana Workspace URL: ${ENDPOINT}"
          echo "GRAFANA_URL=${ENDPOINT}" >> $GITHUB_ENV

      - name: Deploy Grafana Configuration stack
        id: configure-grafana
        run: |
          ENV="${{ github.event.inputs.environment || 'development' }}"

          echo "🚀 Deploying stack: ${{ env.CONFIG_STACK_NAME }}"

          aws cloudformation deploy \
            --template-file ${{ env.CONFIG_TEMPLATE_FILE }} \
            --stack-name ${{ env.CONFIG_STACK_NAME }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              GrafanaApiKeyGeneratorFunctionArn="${{ steps.deploy-grafana.outputs.GrafanaApiKeyGeneratorFunctionArn }}" \
              WorkspaceName="grafana-${ENV}" \
              AlertEmailAddress="${{ steps.deploy-grafana.outputs.AlertEmailAddress || 'selene.gomez@gmail.com' }}" \
              GrafanaAlertTopicName="${{ steps.deploy-grafana.outputs.GrafanaAlertTopicName || 'grafana-alerts' }}" \
            --tags \
              Environment="${ENV}" \
              ManagedBy="GitHubActions" \
              Repository="${{ github.repository }}" \
              Commit="${{ github.sha }}"

          echo "✅ Stack deployment complete"



